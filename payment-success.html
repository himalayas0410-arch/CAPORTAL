<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Success — GSTverify</title>
  <link rel="stylesheet" href="assets/css/style.css"><link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="py-20 bg-surface/40">
    <div class="mx-auto max-md p-4 text-center">
      <div class="card shadow-card max-w-md mx-auto">
        <div class="mx-auto flex h-16 w-16 items-center justify-center rounded-full bg-success/10 text-success mb-6">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        </div>
        <h1 class="text-3xl font-bold mb-2">Payment Successful!</h1>
        <p class="text-muted-foreground mb-8">
          Your subscription is now active. A payment receipt has been sent to your registered email address.
        </p>
        
        <div class="rounded-lg border bg-surface p-4 text-left mb-8 space-y-2">
          <div class="flex justify-between text-sm">
            <span class="text-muted-foreground">Receipt ID</span>
            <span class="font-medium">GST-REC-2026-001</span>
          </div>
          <div class="flex justify-between text-sm">
            <span class="text-muted-foreground">Amount Paid</span>
            <span class="font-medium">₹23,599</span>
          </div>
          <div class="flex justify-between text-sm">
            <span class="text-muted-foreground">Plan</span>
            <span class="font-medium">Professional (1 Year)</span>
          </div>
        </div>

        <div class="space-y-3">
          <a href="dashboard/index.html" class="btn btn-primary w-full btn-lg">Go to Dashboard</a>
          <a href="index.html" class="btn btn-ghost w-full">Back to Home</a>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="assets/js/main.js"></script>
</body>
</html>
