<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us — GSTverify</title>
  <link rel="stylesheet" href="assets/css/style.css"><link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="py-20 bg-surface/40">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
      <div class="grid gap-12 lg:grid-cols-2">
        <div>
          <h1 class="font-serif text-4xl font-bold">Get in touch</h1>
          <p class="mt-4 text-lg text-muted-foreground">
            Have questions about bulk verification or custom plans? Our team is here to help.
          </p>

          <div class="mt-12 space-y-8">
            <div class="flex items-start gap-4">
              <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-lg bg-primary/10 text-primary">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
              </div>
              <div>
                <h3 class="font-bold">Email</h3>
                <p class="text-sm text-muted-foreground">support@gstverify.in</p>
              </div>
            </div>
            <div class="flex items-start gap-4">
              <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-lg bg-primary/10 text-primary">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
              </div>
              <div>
                <h3 class="font-bold">Phone</h3>
                <p class="text-sm text-muted-foreground">+91 98765 43210</p>
              </div>
            </div>
            <div class="flex items-start gap-4">
              <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-lg bg-primary/10 text-primary">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
              </div>
              <div>
                <h3 class="font-bold">Office</h3>
                <p class="text-sm text-muted-foreground">Sector 62, Noida, Uttar Pradesh 201301</p>
              </div>
            </div>
          </div>
        </div>

        <div class="rounded-2xl border bg-card p-8 shadow-soft">
          <form class="grid gap-6">
            <div class="grid gap-4 sm:grid-cols-2">
              <div class="form-group">
                <label>First Name</label>
                <input type="text" class="form-control" placeholder="John">
              </div>
              <div class="form-group">
                <label>Last Name</label>
                <input type="text" class="form-control" placeholder="Doe">
              </div>
            </div>
            <div class="form-group">
              <label>Work Email</label>
              <input type="email" class="form-control" placeholder="john@company.com">
            </div>
            <div class="form-group">
              <label>Message</label>
              <textarea class="form-control" rows="4" placeholder="Tell us how we can help..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-full">Send Message</button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="assets/js/main.js"></script>
</body>
</html>
