<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — GSTverify</title>
  <link rel="stylesheet" href="assets/css/style.css"><link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="auth-main py-20">
    <div class="auth-card">
      <div class="mb-6 text-center">
        <h1 class="text-3xl font-bold">Welcome back</h1>
        <p class="mt-2 text-sm text-muted-foreground">Sign in to your dashboard to manage verifications.</p>
      </div>

      <div class="card shadow-soft">
        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email or mobile</label>
            <input type="text" id="email" class="form-control" placeholder="you@company.com" required>
          </div>
          <div class="form-group">
            <div class="flex items-center justify-between">
              <label for="password">Password</label>
              <a href="forgot-password.html" class="text-xs text-primary hover:underline">Forgot?</a>
            </div>
            <input type="password" id="password" class="form-control" placeholder="••••••" required>
          </div>
          
          <div class="mb-4 flex items-center gap-2">
            <input type="checkbox" id="remember">
            <label for="remember" class="text-xs text-muted-foreground">Remember me for 30 days</label>
          </div>

          <button type="submit" class="btn btn-primary w-full btn-lg">Sign in</button>
        </form>
        
        <p class="mt-6 text-center text-xs text-muted-foreground">
          Don't have an account? <a href="register.html" class="text-primary hover:underline">Register now</a>
        </p>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="assets/js/main.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (email === 'demo@gstverify.in' && password === 'password123') {
        window.location.href = 'dashboard/index.html';
      } else if (email && password) {
        // Mock success for any entry for demo purposes
        window.location.href = 'dashboard/index.html';
      }
    });
  </script>
</body>
</html>
