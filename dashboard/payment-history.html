    <div class="main-content">
      <header class="topbar">
        <h1 class="text-sm font-medium">Payment History</h1>
      </header>

      <main class="flex-1 p-4 sm:p-6 lg:p-8">
        <div class="space-y-6">
          <div>
            <h1 class="font-serif text-3xl font-bold">Payment History</h1>
            <p class="text-sm text-muted-foreground">Receipts and billing history for your subscription.</p>
          </div>

          <div class="card p-0 overflow-hidden">
            <div class="overflow-x-auto">
              <table class="w-full text-sm">
                <thead class="bg-surface text-xs uppercase tracking-wider text-muted-foreground">
                  <tr>
                    <th class="px-5 py-3 text-left">Receipt ID</th>
                    <th class="px-5 py-3 text-left">Date</th>
                    <th class="px-5 py-3 text-left">Plan</th>
                    <th class="px-5 py-3 text-right">Amount</th>
                    <th class="px-5 py-3 text-left">Status</th>
                    <th class="px-5 py-3 text-right">Action</th>
                  </tr>
                </thead>
                <tbody id="paymentsTableBody">
                  <!-- JS populated -->
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../assets/js/mock-data.js"></script>
  <script src="../assets/js/dashboard.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // 1. Protect Page
      const user = await window.authBackend.protectPage();
      if (!user) return;

      // 2. Load Payments
      const payments = await window.subscriptionBackend.getPaymentHistory(user.id);
      const tbody = document.getElementById('paymentsTableBody');
      
      if (payments.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="px-5 py-8 text-center text-muted-foreground">No payment history found.</td></tr>';
      } else {
        tbody.innerHTML = payments.map(p => {
          const date = new Date(p.payment_date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
          const planName = p.subscription_plans?.name || 'Subscription';
          
          return `
            <tr class="border-t border-border">
              <td class="px-5 py-3 font-mono text-xs text-primary">${p.receipt_no}</td>
              <td class="px-5 py-3 text-muted-foreground">${date}</td>
              <td class="px-5 py-3 font-medium">${planName}</td>
              <td class="px-5 py-3 text-right font-medium">₹${p.amount.toLocaleString()}</td>
              <td class="px-5 py-3">
                 <span class="inline-flex rounded-full px-2 py-0.5 text-xs font-medium ${
                   p.payment_status === 'success' ? 'bg-success/10 text-success' : 'bg-destructive/10 text-destructive'
                 }">
                  ${p.payment_status === 'success' ? 'Paid' : p.payment_status}
                </span>
              </td>
              <td class="px-5 py-3 text-right">
                <button onclick="window.print()" class="btn btn-ghost btn-sm">Print</button>
              </td>
            </tr>
          `;
        }).join('');
      }

      // Logout
      document.querySelectorAll('.logout-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          await window.authBackend.signOut();
        });
      });
    });
  </script>
