  <div class="dashboard-container">
    <div id="sidebarOverlay" class="sidebar-overlay hidden lg:hidden"></div>
    <aside id="sidebar" class="sidebar -translate-x-full lg:translate-x-0">
       <div class="flex h-16 items-center border-b px-5">

            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></svg>
          </div>
          <span class="font-serif text-lg font-bold">GSTverify</span>
        </a>
      </div>
      <nav class="flex-1 overflow-y-auto p-3">
        <a href="index.html" class="nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
          Dashboard

        <a href="upload.html" class="nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
          Upload GSTIN Excel

        <a href="reports.html" class="nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
          Reports
        </a>
        <a href="subscription.html" class="nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
          Subscription

        <a href="payment-history.html" class="nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1-2-1Z"/><path d="M16 8h-6"/><path d="M16 12h-9"/><path d="M10 16h-3"/></svg>

        <a href="profile.html" class="nav-link active">

          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>
          Help / Support
        </a>
      </nav>
      <div class="border-t p-3">
        <button class="logout-btn nav-link w-full border-none bg-transparent cursor-pointer">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
          Logout
        </button>
      </div>
    </aside>

    <div class="main-content">
      <header class="topbar">
        <h1 class="text-sm font-medium">Profile</h1>
      </header>

      <main class="flex-1 p-4 sm:p-6 lg:p-8">
        <div class="mx-auto max-w-4xl space-y-6">
          <div>
            <h1 class="font-serif text-3xl font-bold">Profile</h1>
            <p class="text-sm text-muted-foreground">Manage your personal and company information.</p>
          </div>

          <div class="card p-6">
            <h3 class="text-lg font-bold mb-4 border-b pb-2">Personal Information</h3>
            <div class="grid gap-4 sm:grid-cols-2">
              <div class="form-group">
                <label>Full Name</label>
                <input type="text" class="form-control" value="Rahul Sharma">
              </div>
              <div class="form-group">
                <label>Email Address</label>
                <input type="email" class="form-control" value="demo@gstinportal.com" disabled>
              </div>
              <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel" class="form-control" value="9876543210">
              </div>
            </div>
          </div>

          <div class="card p-6">
            <h3 class="text-lg font-bold mb-4 border-b pb-2">Company Information</h3>
            <div class="grid gap-4 sm:grid-cols-2">
              <div class="form-group">
                <label>Company Name</label>
                <input type="text" class="form-control" value="ABC Traders Pvt Ltd">
              </div>
              <div class="form-group">
                <label>GSTIN</label>
                <input type="text" class="form-control" value="09ABCDE1234F1Z5">
              </div>
            </div>
            <div class="form-group">
              <label>Address</label>
              <textarea class="form-control" rows="2">12 Industrial Area, Sector 4</textarea>
            </div>
            <div class="grid gap-4 sm:grid-cols-3">
               <div class="form-group">
                <label>City</label>
                <input type="text" class="form-control" value="Noida">
              </div>
              <div class="form-group">
                <label>State</label>
                <input type="text" class="form-control" value="Uttar Pradesh">
              </div>
              <div class="form-group">
                <label>Pincode</label>
                <input type="text" class="form-control" value="201301">
              </div>
            </div>
          </div>

          <div class="flex justify-end gap-3">
             <button class="btn btn-outline">Cancel</button>
             <button onclick="alert('Profile updated successfully!')" class="btn btn-primary">Save Changes</button>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../assets/js/dashboard.js"></script>
</body>
</html>
