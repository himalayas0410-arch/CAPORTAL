          Logout

    <div class="main-content">
      <header class="topbar">
        <div class="flex items-center gap-3">
          <button class="lg:hidden" aria-label="Open menu">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
          </button>
          <p class="text-sm text-muted-foreground">
            <span class="hidden sm:inline">Settings, </span>
            <span id="userName" class="font-medium text-foreground">User</span>
          </p>
        </div>
        <div class="flex items-center gap-3">
          <span id="headerPlanTag" class="hidden rounded-full px-3 py-1 text-xs font-medium text-primary bg-primary/10 sm:inline-block">
            Loading...
          </span>
          <button class="logout-btn btn btn-ghost btn-sm">Logout</button>
        </div>
      </header>

      <main class="flex-1 p-4 sm:p-6 lg:p-8">
        <div class="mx-auto max-w-4xl space-y-6">
          <div>
            <h1 class="font-serif text-3xl font-bold">Profile</h1>
            <p class="text-sm text-muted-foreground">Manage your personal and company information.</p>
          </div>

          <div class="card p-6">
            <h3 class="text-lg font-bold mb-4 border-b pb-2">Personal Information</h3>
            <div class="grid gap-4 sm:grid-cols-2">
              <div class="form-group">
                <label>Full Name</label>
                <input type="text" class="form-control" value="Rahul Sharma">
              </div>
              <div class="form-group">
                <label>Email Address</label>
                <input type="email" class="form-control" value="demo@gstinportal.com" disabled>
              </div>
              <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel" class="form-control" value="9876543210">
              </div>
            </div>
          </div>

          <div class="card p-6">
            <h3 class="text-lg font-bold mb-4 border-b pb-2">Company Information</h3>
            <div class="grid gap-4 sm:grid-cols-2">
              <div class="form-group">
                <label>Company Name</label>
                <input type="text" class="form-control" value="ABC Traders Pvt Ltd">
              </div>
              <div class="form-group">
                <label>GSTIN</label>
                <input type="text" class="form-control" value="09ABCDE1234F1Z5">
              </div>
            </div>
            <div class="form-group">
              <label>Address</label>
              <textarea class="form-control" rows="2">12 Industrial Area, Sector 4</textarea>
            </div>
            <div class="grid gap-4 sm:grid-cols-3">
               <div class="form-group">
                <label>City</label>
                <input type="text" class="form-control" value="Noida">
              </div>
              <div class="form-group">
                <label>State</label>
                <input type="text" class="form-control" value="Uttar Pradesh">
              </div>
              <div class="form-group">
                <label>Pincode</label>
                <input type="text" class="form-control" value="201301">
              </div>
            </div>
          </div>

          <div class="flex justify-end gap-3">
             <button class="btn btn-outline">Cancel</button>
             <button onclick="alert('Profile updated successfully!')" class="btn btn-primary">Save Changes</button>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // 1. Protect Page
      const user = await window.authBackend.protectPage();
      if (!user) return;

      const profile = await window.profileBackend.getProfile();
      if (!profile) return;

      // Fill form
      document.querySelector('input[type="text"]').value = profile.full_name || '';
      document.querySelector('input[type="email"]').value = user.email || '';
      document.querySelectorAll('input[type="tel"]')[0].value = profile.phone || '';
      
      const companyInputs = document.querySelectorAll('.card:nth-of-type(2) input');
      companyInputs[0].value = profile.company_name || '';
      companyInputs[1].value = profile.gstin || '';
      
      document.querySelector('textarea').value = profile.address || '';
      
      const geoInputs = document.querySelectorAll('.grid.sm\\:grid-cols-3 input');
      geoInputs[0].value = profile.city || '';
      geoInputs[1].value = profile.state || '';
      geoInputs[2].value = profile.pincode || '';

      // Save changes
      const saveBtn = document.querySelector('.btn-primary');
      saveBtn.addEventListener('click', async () => {
        const updatedData = {
          full_name: document.querySelector('input[type="text"]').value,
          phone: document.querySelectorAll('input[type="tel"]')[0].value,
          company_name: companyInputs[0].value,
          gstin: companyInputs[1].value,
          address: document.querySelector('textarea').value,
          city: geoInputs[0].value,
          state: geoInputs[1].value,
          pincode: geoInputs[2].value
        };

        saveBtn.innerText = 'Saving...';
        saveBtn.disabled = true;

        const success = await window.profileBackend.updateProfile(updatedData);
        if (success) {
          window.showToast('Profile updated successfully!', 'success');
        }

        saveBtn.innerText = 'Save Changes';
        saveBtn.disabled = false;
      });

    });
  </script>
