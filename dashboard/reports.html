          </button>
          <p class="text-sm text-muted-foreground">
            <span class="hidden sm:inline">Welcome back, </span>
            <span id="userName" class="font-medium text-foreground">User</span>
          </p>
        </div>
        <div class="flex items-center gap-3">
          <span id="headerPlanTag" class="hidden rounded-full px-3 py-1 text-xs font-medium text-primary bg-primary/10 sm:inline-block">
            Loading...
          </span>
          <button class="logout-btn btn btn-ghost btn-sm">Logout</button>
        </div>
      </header>

      <main class="flex-1 p-4 sm:p-6 lg:p-8">
        <div class="space-y-6">
          <div class="flex flex-wrap items-end justify-between gap-3">
            <div>
              <h1 class="font-serif text-3xl font-bold">Reports</h1>
              <p class="text-sm text-muted-foreground">All GSTIN verification reports you've generated.</p>
            </div>
            <a href="upload.html" class="btn btn-primary">Upload new file</a>
          </div>

          <div class="card p-0 overflow-hidden">
            <div class="overflow-x-auto">
              <table class="w-full text-sm">
                <thead class="bg-surface text-xs uppercase tracking-wider text-muted-foreground">
                  <tr>
                    <th class="px-5 py-3 text-left">Report ID</th>
                    <th class="px-5 py-3 text-left">File</th>
                    <th class="px-5 py-3 text-left">Date</th>
                    <th class="px-5 py-3 text-right">Total</th>
                    <th class="px-5 py-3 text-left">Status</th>
                    <th class="px-5 py-3 text-right">Actions</th>
                  </tr>
                </thead>
                <tbody id="reportsTableBody">
                  <!-- JS populated -->
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../assets/js/mock-data.js"></script>
  <script src="../assets/js/dashboard.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // 1. Protect Page
      const user = await window.authBackend.protectPage();
      if (!user) return;

      const tbody = document.getElementById('reportsTableBody');
      const uploads = await window.reportsBackend.getUserUploads();

      if (uploads.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="px-5 py-8 text-center text-muted-foreground">No reports found. <a href="upload.html" class="text-primary hover:underline">Upload your first file</a></td></tr>';
      } else {
        tbody.innerHTML = uploads.map(r => `
          <tr class="border-t border-border hover:bg-surface">
            <td class="px-5 py-3 font-mono text-xs">${r.id.substring(0, 8)}...</td>
            <td class="px-5 py-3">${r.file_name}</td>
            <td class="px-5 py-3 text-muted-foreground">${new Date(r.created_at).toLocaleDateString()}</td>
            <td class="px-5 py-3 text-right">${r.total_records || '--'}</td>
            <td class="px-5 py-3">
              <span class="inline-flex rounded-full px-2 py-0.5 text-xs font-medium" style="background-color: ${
                r.status === 'completed' ? 'rgba(16, 185, 129, 0.1)' : 
                r.status === 'failed' ? 'rgba(239, 68, 68, 0.1)' : 'rgba(245, 158, 11, 0.1)'
              }; color: ${
                r.status === 'completed' ? 'rgb(16, 185, 129)' : 
                r.status === 'failed' ? 'rgb(239, 68, 68)' : 'rgb(245, 158, 11)'
              }">
                ${r.status.charAt(0).toUpperCase() + r.status.slice(1)}
              </span>
            </td>
            <td class="px-5 py-3 text-right">
              <div class="flex justify-end gap-2">
                ${r.status === 'completed' ? `
                  <a href="report-detail.html?id=${r.id}" class="btn btn-ghost btn-sm">View</a>
                  <button class="btn btn-outline btn-sm download-csv" data-id="${r.id}">Excel</button>
                ` : `
                  <a href="processing.html?id=${r.id}" class="btn btn-outline btn-sm">Track</a>
                `}
              </div>
            </td>
          </tr>
        `).join('');

        // Handle CSV Download
        document.querySelectorAll('.download-csv').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            const id = e.target.getAttribute('data-id');
            const btnText = e.target.innerText;
            e.target.innerText = '...';
            
            const report = await window.reportsBackend.getReportDetails(id);
            if (report && report.results) {
              window.reportsBackend.downloadCSV(report.results, `report-${id.substring(0,8)}.csv`);
            }
            
            e.target.innerText = btnText;
          });
        });
      }

    });
  </script>
