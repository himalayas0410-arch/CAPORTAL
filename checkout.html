<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — GSTverify</title>
  <link rel="stylesheet" href="assets/css/style.css"><link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="flex-1 py-12">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
      <div class="mb-8">
        <h1 class="text-3xl font-bold">Checkout</h1>
        <p class="text-muted-foreground">Complete your subscription payment.</p>
      </div>

      <div class="grid gap-8 lg:grid-cols-3">
        <div class="lg:col-span-2">
          <div class="card shadow-soft">
            <h2 class="text-xl font-bold mb-6">Payment Method</h2>
            <div class="grid gap-4 sm:grid-cols-2">
              <div class="payment-option cursor-pointer rounded-xl border-2 p-4 transition-all hover:border-primary active" onclick="selectPayment(this)">
                <div class="flex items-center gap-3">
                  <div class="flex h-5 w-5 items-center justify-center rounded-full border-2 border-primary">
                    <div class="h-2.5 w-2.5 rounded-full bg-primary"></div>
                  </div>
                  <span class="font-bold">UPI / QR Code</span>
                </div>
              </div>
              <div class="payment-option cursor-pointer rounded-xl border-2 p-4 transition-all hover:border-primary" onclick="selectPayment(this)">
                <div class="flex items-center gap-3">
                  <div class="flex h-5 w-5 items-center justify-center rounded-full border-2 border-slate-300"></div>
                  <span class="font-bold">Cards / Netbanking</span>
                </div>
              </div>
            </div>

            <div class="mt-8 text-center">
              <p class="text-sm font-medium mb-4">Scan QR code to pay with any UPI app</p>
              <div class="mx-auto h-48 w-48 rounded-lg bg-slate-100 flex items-center justify-center border">
                <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="text-slate-400"><rect width="5" height="5" x="3" y="3" rx="1"/><rect width="5" height="5" x="16" y="3" rx="1"/><rect width="5" height="5" x="3" y="16" rx="1"/><path d="M21 16h-3a2 2 0 0 0-2 2v3"/><path d="M21 21v.01"/><path d="M12 7v3a2 2 0 0 1-2 2H7"/><path d="M3 12h.01"/><path d="M12 3h.01"/><path d="M12 16v.01"/><path d="M16 12h1"/><path d="M21 12v.01"/><path d="M12 21v-1"/></svg>
              </div>
              <p class="mt-4 text-lg font-bold">₹23,599.00</p>
              <p class="text-xs text-muted-foreground">(Including 18% GST)</p>
            </div>
          </div>
        </div>

        <div class="lg:col-span-1">
          <div class="card shadow-soft sticky top-24">
            <h2 class="text-lg font-bold mb-4">Order Summary</h2>
            <div class="space-y-4">
              <div class="flex justify-between text-sm">
                <span class="text-muted-foreground">Professional Plan</span>
                <span class="font-medium">₹19,999.00</span>
              </div>
              <div class="flex justify-between text-sm">
                <span class="text-muted-foreground">GST (18%)</span>
                <span class="font-medium">₹3,600.00</span>
              </div>
              <div class="border-t pt-4 flex justify-between font-bold">
                <span>Total Amount</span>
                <span class="text-primary">₹23,599.00</span>
              </div>
            </div>
            <button onclick="window.location.href='payment-success.html'" class="btn btn-primary w-full btn-lg mt-8 shadow-lg shadow-primary/20">I've made the payment</button>
            <p class="mt-4 text-center text-xs text-muted-foreground">Secure payment processed via Razorpay</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/mock-data.js"></script>
  <script>
    function selectPayment(el) {
      document.querySelectorAll('.payment-option').forEach(opt => {
        opt.classList.remove('active');
        opt.querySelector('.rounded-full').classList.replace('border-primary', 'border-slate-300');
        const inner = opt.querySelector('.rounded-full div');
        if(inner) inner.remove();
      });
      el.classList.add('active');
      el.querySelector('.rounded-full').classList.replace('border-slate-300', 'border-primary');
      const dot = document.createElement('div');
      dot.className = 'h-2.5 w-2.5 rounded-full bg-primary';
      el.querySelector('.rounded-full').appendChild(dot);
    }
  </script>
</body>
</html>
