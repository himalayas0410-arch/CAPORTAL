<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile Nav Test</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
  <!-- Header directly embedded (not loaded via JS) -->
  <header class="sticky top-0 z-40 w-full border-b bg-background/80 backdrop-blur-md">
    <div class="mx-auto flex h-20 max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">
      <!-- Logo -->
      <a href="index.html" class="flex items-center gap-2.5">
        <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-primary text-primary-foreground shadow-lg shadow-primary/20">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-shield-check"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></svg>
        </div>
        <div class="flex flex-col leading-tight">
          <span class="font-serif text-xl font-bold tracking-tight">GSTverify</span>
          <span class="text-xs uppercase tracking-widest text-muted-foreground font-semibold" style="font-size:10px;letter-spacing:0.2em;">GSTIN Portal</span>
        </div>
      </a>

      <!-- Centered Nav (Visible on Desktop) -->
      <nav class="hidden flex-1 items-center justify-center gap-8 md:flex main-nav">
        <a href="index.html" data-nav="index" class="text-sm font-medium transition-colors hover:text-primary">Home</a>
        <a href="about.html" data-nav="about" class="text-sm font-medium transition-colors hover:text-primary">About</a>
        <a href="services.html" data-nav="services" class="text-sm font-medium transition-colors hover:text-primary">Services</a>
        <a href="pricing.html" data-nav="pricing" class="text-sm font-medium transition-colors hover:text-primary">Pricing</a>
        <a href="contact.html" data-nav="contact" class="text-sm font-medium transition-colors hover:text-primary">Contact</a>
      </nav>

      <!-- Right Action -->
      <div class="hidden items-center md:flex">
        <a href="dashboard/index.html" class="btn btn-primary rounded-xl px-6 py-2.5 font-bold shadow-md">
          Go to Dashboard
        </a>
      </div>

      <!-- Mobile Menu Toggle Button -->
      <button class="md:hidden mobile-nav-toggle p-2 text-foreground relative z-50" aria-label="Toggle menu">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
      </button>
    </div>

    <!-- Mobile Nav Menu (Hidden by default) -->
    <div class="mobile-nav hidden border-t border-slate-100 bg-white shadow-xl">
      <div class="mx-auto flex max-w-7xl flex-col gap-1 px-4 py-6 mobile-nav-links">
        <a href="index.html" data-nav="index" class="rounded-xl px-4 py-3 text-sm font-medium text-slate-600 hover:bg-slate-50">Home</a>
        <a href="about.html" data-nav="about" class="rounded-xl px-4 py-3 text-sm font-medium text-slate-600 hover:bg-slate-50">About</a>
        <a href="services.html" data-nav="services" class="rounded-xl px-4 py-3 text-sm font-medium text-slate-600 hover:bg-slate-50">Services</a>
        <a href="pricing.html" data-nav="pricing" class="rounded-xl px-4 py-3 text-sm font-medium text-slate-600 hover:bg-slate-50">Pricing</a>
        <a href="contact.html" data-nav="contact" class="rounded-xl px-4 py-3 text-sm font-medium text-slate-600 hover:bg-slate-50">Contact</a>
        <div class="mt-4 flex flex-col gap-3 border-t border-slate-100 pt-6">
          <a href="login.html" class="btn btn-outline w-full rounded-xl py-3 font-bold">Login</a>
          <a href="dashboard/index.html" class="btn btn-primary w-full rounded-xl py-3 font-bold">Go to Dashboard</a>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="py-20">
      <div class="mx-auto max-w-7xl px-4">
        <h1 class="text-4xl font-bold">Mobile Nav Test Page</h1>
        <p class="mt-4 text-lg">Resize your browser to mobile size and click the hamburger menu.</p>
        <p class="mt-2 text-muted-foreground">Check the browser console (F12) for debug messages.</p>
      </div>
    </section>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const toggle = document.querySelector('.mobile-nav-toggle');
      const mobileNav = document.querySelector('.mobile-nav');

      console.log('Page loaded!');
      console.log('Toggle button:', toggle);
      console.log('Mobile nav:', mobileNav);

      if (!toggle || !mobileNav) {
        console.error('ERROR: Elements not found!');
        return;
      }

      console.log('Elements found! Setting up listeners...');

      // Toggle menu on button click
      toggle.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        console.log('🔘 Toggle clicked!');
        mobileNav.classList.toggle('hidden');
        console.log('📱 Menu is now:', mobileNav.classList.contains('hidden') ? 'HIDDEN ❌' : 'VISIBLE ✅');
      });

      // Close menu when clicking outside
      document.addEventListener('click', (e) => {
        if (!mobileNav.classList.contains('hidden')) {
          if (!e.target.closest('.mobile-nav') && !e.target.closest('.mobile-nav-toggle')) {
            mobileNav.classList.add('hidden');
            console.log('🚪 Menu closed - clicked outside');
          }
        }
      });

      // Close menu when clicking on a link
      const mobileLinks = document.querySelectorAll('.mobile-nav-links a');
      mobileLinks.forEach(link => {
        link.addEventListener('click', () => {
          mobileNav.classList.add('hidden');
          console.log('🔗 Menu closed - link clicked');
        });
      });

      console.log('✅ Mobile nav initialized successfully!');
    });
  </script>

  

  <!-- Supabase Integration -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/subscription-backend.js"></script>
  <script src="assets/js/upload-backend.js"></script>
  <script src="assets/js/reports-backend.js"></script>
  <script src="assets/js/profile-backend.js"></script>
  <script src="assets/js/contact-support-backend.js"></script>
  <script src="assets/js/admin-backend.js"></script>
</body>
</html>
