<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — GSTverify</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
  <div class="auth-shell">
    <header class="auth-header">
      <div class="mx-auto flex w-full max-w-7xl items-center justify-between">
        <a href="index.html" class="flex items-center gap-2">
          <div class="flex h-9 w-9 items-center justify-center rounded-md bg-primary text-primary-foreground">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-shield-check"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></svg>
          </div>
          <span class="font-serif text-lg font-bold">GSTverify</span>
        </a>
        <a href="index.html" class="text-sm text-muted-foreground hover:text-foreground">← Back to site</a>
      </div>
    </header>

    <main class="auth-main">
      <div class="auth-card">
        <div class="mb-6 text-center">
          <h1 class="text-3xl font-bold">Subscriber Details</h1>
          <p class="mt-2 text-sm text-muted-foreground">Complete your registration to start verifying GSTIN.</p>
        </div>

        <div class="card shadow-soft">
          <form id="registerForm">
            <div class="grid gap-4 sm:grid-cols-2">
              <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" class="form-control" placeholder="John Doe" required>
              </div>
              <div class="form-group">
                <label for="company">Company Name</label>
                <input type="text" id="company" class="form-control" placeholder="ABC Pvt Ltd" required>
              </div>
            </div>
            <div class="grid gap-4 sm:grid-cols-2">
              <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
              </div>
              <div class="form-group">
                <label for="mobile">Mobile Number</label>
                <input type="tel" id="mobile" class="form-control" placeholder="9876543210" required>
              </div>
            </div>
            <div class="form-group">
              <label for="gstin">GSTIN (Optional)</label>
              <input type="text" id="gstin" class="form-control" placeholder="09ABCDE1234F1Z5">
            </div>
            <div class="grid gap-4 sm:grid-cols-2">
              <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••" required>
              </div>
              <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" class="form-control" placeholder="••••••" required>
              </div>
            </div>
            
            <div class="mb-4 flex items-start gap-2">
              <input type="checkbox" id="terms" required style="margin-top: 0.25rem;">
              <label for="terms" class="text-xs text-muted-foreground">
                I agree to the <a href="#" class="text-primary hover:underline">Terms of Service</a> and <a href="#" class="text-primary hover:underline">Privacy Policy</a>.
              </label>
            </div>

            <button type="submit" class="btn btn-primary w-full btn-lg">Continue to Payment</button>
          </form>
          
          <p class="mt-6 text-center text-xs text-muted-foreground">
            Already have an account? <a href="login.html" class="text-primary hover:underline">Login instead</a>
          </p>
        </div>
      </div>
    </main>
  </div>

  <script src="assets/js/main.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const pass = document.getElementById('password').value;
      const confirmPass = document.getElementById('confirmPassword').value;

      if (pass !== confirmPass) {
        alert('Passwords do not match.');
        return;
      }
      
      // Mock save to localStorage
      const userData = {
        name: document.getElementById('name').value,
        company: document.getElementById('company').value,
        email: document.getElementById('email').value,
      };
      localStorage.setItem('pendingUser', JSON.stringify(userData));
      
      window.location.href = 'checkout.html';
    });
  </script>
</body>
</html>
