<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Reports — GSTverify</title>
  <link rel="stylesheet" href="../assets/css/style.css"><link rel="stylesheet" href="../assets/css/responsive.css">
</head>
<body>
  <div class="admin-container">
    <aside class="admin-sidebar">
       <div class="flex h-16 items-center border-b border-slate-800 px-5">
        <span class="font-serif text-lg font-bold text-white">Admin Console</span>
      </div>
      <nav class="flex-1 p-2">
        <a href="dashboard.html" class="admin-nav-link">Dashboard</a>
        <a href="subscribers.html" class="admin-nav-link">Subscribers</a>
        <a href="plans.html" class="admin-nav-link">Plans</a>
        <a href="reports.html" class="admin-nav-link active">Reports</a>
        <a href="payments.html" class="admin-nav-link">Payments</a>
      </nav>
    </aside>

    <div class="main-content">
      <header class="topbar">
        <h1 class="text-sm font-medium">System Reports</h1>
      </header>

      <main class="flex-1 p-4 sm:p-6 lg:p-8">
        <div class="space-y-6">
          <h2 class="text-2xl font-bold">Verification Logs</h2>
          
          <div class="card p-0 overflow-hidden">
             <table class="w-full text-sm text-left">
                <thead class="bg-slate-50 text-xs uppercase text-muted-foreground">
                   <tr>
                      <th class="px-5 py-3">Report ID</th>
                      <th class="px-5 py-3">Subscriber</th>
                      <th class="px-5 py-3">File Name</th>
                      <th class="px-5 py-3 text-right">Records</th>
                      <th class="px-5 py-3">Status</th>
                   </tr>
                </thead>
                <tbody id="reportsBody">
                   <!-- Backend populated -->
                </tbody>
             </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // 1. Protect Admin Page
      const user = await window.authBackend.protectAdminPage();
      if (!user) return;

      const tbody = document.getElementById('reportsBody');

      async function loadReports() {
        const reports = await window.adminBackend.getReports(1, 50);
        
        if (reports.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" class="py-10 text-center text-muted-foreground">No verification logs found</td></tr>';
          return;
        }

        tbody.innerHTML = reports.map(r => `
          <tr class="border-t border-slate-100 hover:bg-slate-50">
            <td class="px-5 py-3 font-mono text-xs text-primary">RPT-${r.id.substring(0, 8).toUpperCase()}</td>
            <td class="px-5 py-3">
               <div class="font-medium">${r.profiles ? r.profiles.full_name || 'No Name' : 'N/A'}</div>
               <div class="text-xs text-muted-foreground">${r.profiles ? r.profiles.email : ''}</div>
            </td>
            <td class="px-5 py-3 text-muted-foreground">${r.file_name}</td>
            <td class="px-5 py-3 text-right">${r.total_records}</td>
            <td class="px-5 py-3">
               <span class="inline-flex rounded-full px-2 py-0.5 text-xs font-medium bg-success/10 text-success">Completed</span>
            </td>
          </tr>
        `).join('');
      }

      loadReports();

      // Logout
      document.querySelectorAll('.admin-nav-link[href="../index.html"]').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.preventDefault();
          await window.authBackend.signOut();
        });
      });
    });
  </script>

  

  <!-- Supabase Integration -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase-client.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/subscription-backend.js"></script>
  <script src="../assets/js/upload-backend.js"></script>
  <script src="../assets/js/reports-backend.js"></script>
  <script src="../assets/js/profile-backend.js"></script>
  <script src="../assets/js/contact-support-backend.js"></script>
  <script src="../assets/js/admin-backend.js"></script>
</body>
</html>
