<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — GSTverify</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <style>
    .admin-auth-shell { min-height: 100vh; display: flex; flex-direction: column; background-color: #0f172a; color: white; }
    .admin-form-control { width: 100%; padding: 0.625rem; border: 1px solid #334155; border-radius: var(--radius); outline: none; background: #1e293b; color: white; }
    .admin-form-control:focus { border-color: var(--primary); }
  </style>
</head>
<body>
  <div class="admin-auth-shell">
    <main class="auth-main">
      <div class="auth-card">
        <div class="mb-8 text-center">
          <div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-md bg-primary text-primary-foreground">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></svg>
          </div>
          <h1 class="text-2xl font-bold">GSTverify Admin</h1>
          <p class="mt-1 text-sm text-slate-400">Portal Management Console</p>
        </div>

        <div class="card bg-slate-900 border-slate-800 p-6 shadow-2xl">
          <form id="adminLoginForm">
            <div class="form-group">
              <label>Admin Email</label>
              <input type="email" id="email" class="admin-form-control" placeholder="admin@gstinportal.com" required>
            </div>
            <div class="form-group">
              <label>Password</label>
              <input type="password" id="password" class="admin-form-control" placeholder="••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-full btn-lg">Access Console</button>
          </form>
          
          <div class="mt-6 text-center">
            <a href="../index.html" class="text-xs text-slate-500 hover:text-slate-300">← Back to Public Website</a>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        if (!window.authBackend || !window.profileBackend) {
          if (window.showToast) window.showToast('Backend modules still loading. Please wait a moment.', 'error');
          return;
        }

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();

        const btn = e.target.querySelector('button');
        const originalText = btn.innerText;
        btn.innerText = 'Verifying...';
        btn.disabled = true;

        try {
          const data = await window.authBackend.signIn(email, password);
          
          if (data) {
            const profile = await window.profileBackend.getProfile();
            if (profile && profile.role === 'admin') {
              if (window.showToast) window.showToast('Admin access granted!', 'success');
              setTimeout(() => {
                window.location.href = 'dashboard.html';
              }, 1000);
            } else {
              if (window.showToast) window.showToast('Unauthorized. Admin role required.', 'error');
              await window.authBackend.signOut();
              btn.innerText = originalText;
              btn.disabled = false;
            }
          } else {
            // Error already handled by signIn (shows toast)
            btn.innerText = originalText;
            btn.disabled = false;
          }
        } catch (error) {
          console.error('Admin login error:', error);
          if (window.showToast) window.showToast('An unexpected error occurred.', 'error');
          btn.innerText = originalText;
          btn.disabled = false;
        }
      });
    });
  </script>

  

  <!-- Supabase Integration -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase-client.js"></script>
  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/subscription-backend.js"></script>
  <script src="../assets/js/upload-backend.js"></script>
  <script src="../assets/js/reports-backend.js"></script>
  <script src="../assets/js/profile-backend.js"></script>
  <script src="../assets/js/contact-support-backend.js"></script>
  <script src="../assets/js/admin-backend.js"></script>
</body>
</html>
