          Dashboard
        </a>
        <a href="subscribers.html" class="admin-nav-link active">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Subscribers
        </a>
        <a href="plans.html" class="admin-nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>

        <a href="payments.html" class="admin-nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1-2-1Z"/><path d="M16 8h-6"/><path d="M16 12h-9"/><path d="M10 16h-3"/></svg>

        </a>
      </nav>
      <div class="border-t border-slate-800 p-3">
         <a href="../index.html" class="admin-nav-link">
           <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
           Logout
         </a>

    </aside>

    <div class="main-content">
      <header class="topbar">
        <h1 class="text-sm font-medium">Subscribers</h1>
      </header>

      <main class="flex-1 p-4 sm:p-6 lg:p-8">
        <div class="space-y-6">
          <div class="flex flex-wrap items-center justify-between gap-3">
             <h2 class="text-2xl font-bold">Subscriber Management</h2>
             <div class="flex gap-2">
                <input type="text" id="searchInput" class="form-control w-64" placeholder="Search subscribers...">
                <button class="btn btn-primary">Search</button>
             </div>
          </div>

          <div class="card p-0 overflow-hidden">
             <div class="overflow-x-auto">
                <table class="w-full text-sm text-left">
                   <thead class="bg-slate-50 text-xs uppercase text-muted-foreground font-medium">
                      <tr>
                         <th class="px-5 py-3">Subscriber</th>
                         <th class="px-5 py-3">Company</th>
                         <th class="px-5 py-3">Plan</th>
                         <th class="px-5 py-3">Status</th>
                         <th class="px-5 py-3">Expiry</th>
                         <th class="px-5 py-3 text-right">Action</th>
                      </tr>
                   </thead>
                   <tbody id="subscribersBody">
                      <!-- JS populated -->
                   </tbody>
                </table>
             </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../assets/js/mock-data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // 1. Protect Admin Page
      const user = await window.authBackend.protectAdminPage();
      if (!user) return;

      const tbody = document.getElementById('subscribersBody');
      const searchInput = document.getElementById('searchInput');

      async function loadSubscribers(query = '') {
        // For now, we'll fetch all and filter in JS if search is small
        // In production, use Supabase search
        const allSubscribers = await window.adminBackend.getSubscribers(1, 100);
        
        const filtered = allSubscribers.filter(s => 
          (s.full_name || '').toLowerCase().includes(query) || 
          (s.company_name || '').toLowerCase().includes(query) ||
          (s.email || '').toLowerCase().includes(query)
        );

        if (filtered.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" class="py-10 text-center text-muted-foreground">No subscribers found</td></tr>';
          return;
        }

        tbody.innerHTML = filtered.map(s => {
          const sub = s.subscriptions && s.subscriptions.length > 0 ? s.subscriptions[0] : null;
          const planName = sub && sub.subscription_plans ? sub.subscription_plans.name : 'No Plan';
          const status = sub ? sub.status : 'Inactive';
          const expiry = sub ? new Date(sub.end_date).toLocaleDateString() : 'N/A';

          return `
            <tr class="border-t border-slate-100 hover:bg-slate-50">
              <td class="px-5 py-3">
                 <div class="font-medium">${s.full_name || 'No Name'}</div>
                 <div class="text-xs text-muted-foreground">${s.email}</div>
              </td>
              <td class="px-5 py-3 text-muted-foreground">${s.company_name || 'N/A'}</td>
              <td class="px-5 py-3">${planName}</td>
              <td class="px-5 py-3">
                 <span class="inline-flex rounded-full px-2 py-0.5 text-xs font-medium ${
                   status === 'active' ? 'bg-success/10 text-success' : 'bg-destructive/10 text-destructive'
                 }">${status.charAt(0).toUpperCase() + status.slice(1)}</span>
              </td>
              <td class="px-5 py-3 text-muted-foreground">${expiry}</td>
              <td class="px-5 py-3 text-right">
                 <button onclick="alert('Viewing details for ${s.id}')" class="btn btn-ghost btn-sm">View</button>
              </td>
            </tr>
          `;
        }).join('');
      }

      searchInput.addEventListener('input', (e) => loadSubscribers(e.target.value.toLowerCase()));
      loadSubscribers();

      // Logout
      document.querySelectorAll('.admin-nav-link[href="../index.html"]').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.preventDefault();
          await window.authBackend.signOut();
        });
      });
    });
  </script>

  

  <!-- Supabase Integration -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase-client.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/subscription-backend.js"></script>
  <script src="../assets/js/upload-backend.js"></script>
  <script src="../assets/js/reports-backend.js"></script>
  <script src="../assets/js/profile-backend.js"></script>
  <script src="../assets/js/contact-support-backend.js"></script>
  <script src="../assets/js/admin-backend.js"></script>
</body>
