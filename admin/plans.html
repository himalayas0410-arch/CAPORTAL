<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../assets/css/style.css"><link rel="stylesheet" href="../assets/css/responsive.css">
</head>

            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></svg>
          </div>
          <span class="font-serif text-lg font-bold text-white">Admin Console</span>
        </a>
      </div>
      <nav class="flex-1 p-3 space-y-1">
        <a href="dashboard.html" class="admin-nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
          Dashboard
        </a>
        <a href="subscribers.html" class="admin-nav-link">

          Subscribers
        </a>
        <a href="plans.html" class="admin-nav-link active">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
          Plans
        </a>
        <a href="reports.html" class="admin-nav-link">

          Reports
        </a>
        <a href="payments.html" class="admin-nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1-2-1Z"/><path d="M16 8h-6"/><path d="M16 12h-9"/><path d="M10 16h-3"/></svg>
          Payments
        </a>
      </nav>
      <div class="border-t border-slate-800 p-3">
         <a href="../index.html" class="admin-nav-link">
           <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
           Logout
         </a>
      </div>
    </aside>

    <div class="main-content">
      <header class="topbar">
        <h1 class="text-sm font-medium">Subscription Plans</h1>
      </header>

      <main class="flex-1 p-4 sm:p-6 lg:p-8">
        <div class="space-y-6">
          <div class="flex items-center justify-between">
             <h2 class="text-2xl font-bold">Manage Plans</h2>
             <button onclick="alert('Add plan modal...')" class="btn btn-primary">Add New Plan</button>
          </div>

          <div class="grid gap-6 lg:grid-cols-3" id="plansGrid">
             <!-- JS populated -->
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Edit Plan Modal -->
  <div id="editModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 backdrop-blur-sm">
    <div class="card w-full max-w-md p-8 animate-in fade-in zoom-in duration-200">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-xl font-bold">Edit Plan</h3>
        <button onclick="closeModal()" class="text-muted-foreground hover:text-foreground">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <form id="editForm" class="space-y-4">
        <input type="hidden" id="editPlanId">
        <div>
          <label class="block text-sm font-medium mb-1">Plan Name</label>
          <input type="text" id="editName" class="form-control" required>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium mb-1">Price (₹)</label>
            <input type="number" id="editPrice" class="form-control" required>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Validity (Days)</label>
            <input type="number" id="editValidity" class="form-control" required>
          </div>
        </div>
        <div class="pt-4 flex gap-3">
          <button type="button" onclick="closeModal()" class="btn btn-outline flex-1">Cancel</button>
          <button type="submit" class="btn btn-primary flex-1">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../assets/js/mock-data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // 1. Protect Admin Page
      const user = await window.authBackend.protectAdminPage();
      if (!user) return;

      const grid = document.getElementById('plansGrid');
      const editModal = document.getElementById('editModal');
      const editForm = document.getElementById('editForm');
      
      async function loadPlans() {
        const plans = await window.adminBackend.getPlans();
        
        if (plans.length === 0) {
          grid.innerHTML = '<div class="col-span-full py-10 text-center text-muted-foreground">No plans found</div>';
          return;
        }

        grid.innerHTML = plans.map(p => `
          <div class="card p-6 ${!p.is_active ? 'opacity-60 grayscale' : ''}">
             <div class="flex items-start justify-between">
                <h3 class="text-lg font-bold">${p.name}</h3>
                <span class="px-2 py-0.5 rounded-full text-[10px] font-bold uppercase ${p.is_active ? 'bg-success/10 text-success' : 'bg-muted text-muted-foreground'}">
                   ${p.is_active ? 'Active' : 'Inactive'}
                </span>
             </div>
             <p class="text-2xl font-bold mt-2">${p.price > 0 ? '₹' + p.price.toLocaleString() : 'Custom'}</p>
             <p class="text-xs text-muted-foreground">${p.validity_days} Days Validity</p>
             <ul class="mt-4 space-y-2 text-xs text-muted-foreground">
                <li>• ${p.features.records === 'unlimited' ? 'Unlimited' : p.features.records.toLocaleString()} Verifications</li>
                <li>• ${p.max_simultaneous_users} Simultaneous Users</li>
             </ul>
             <div class="mt-6 pt-4 border-t flex gap-2">
                <button onclick="openEditModal('${p.id}', '${p.name}', ${p.price}, ${p.validity_days})" class="btn btn-outline btn-sm flex-1">Edit</button>
                <button onclick="toggleStatus('${p.id}', ${p.is_active})" class="btn btn-ghost btn-sm ${p.is_active ? 'text-destructive' : 'text-success'}">
                   ${p.is_active ? 'Deactivate' : 'Activate'}
                </button>
             </div>
          </div>
        `).join('');
      }

      window.openEditModal = (id, name, price, validity) => {
        document.getElementById('editPlanId').value = id;
        document.getElementById('editName').value = name;
        document.getElementById('editPrice').value = price;
        document.getElementById('editValidity').value = validity;
        editModal.classList.remove('hidden');
        editModal.classList.add('flex');
      };

      window.closeModal = () => {
        editModal.classList.add('hidden');
        editModal.classList.remove('flex');
      };

      window.toggleStatus = async (id, current) => {
        if (!confirm(`Are you sure you want to ${current ? 'deactivate' : 'activate'} this plan?`)) return;
        const res = await window.adminBackend.togglePlanStatus(id, current);
        if (res.success) {
          loadPlans();
        } else {
          alert('Error: ' + res.error);
        }
      };

      editForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('editPlanId').value;
        const updates = {
          name: document.getElementById('editName').value,
          price: parseFloat(document.getElementById('editPrice').value),
          validity_days: parseInt(document.getElementById('editValidity').value)
        };

        const res = await window.adminBackend.updatePlan(id, updates);
        if (res.success) {
          closeModal();
          loadPlans();
        } else {
          alert('Error: ' + res.error);
        }
      });

      loadPlans();

      // Logout
      document.querySelectorAll('.admin-nav-link[href="../index.html"]').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.preventDefault();
          await window.authBackend.signOut();
        });
      });
    });
  </script>

  

  <!-- Supabase Integration -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase-client.js"></script>

  <script src="../assets/js/subscription-backend.js"></script>
  <script src="../assets/js/upload-backend.js"></script>
  <script src="../assets/js/reports-backend.js"></script>
  <script src="../assets/js/profile-backend.js"></script>
  <script src="../assets/js/contact-support-backend.js"></script>
  <script src="../assets/js/admin-backend.js"></script>
</body>
</html>
