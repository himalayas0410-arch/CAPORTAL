<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plans — Admin Console</title>
  <link rel="stylesheet" href="../assets/css/style.css"><link rel="stylesheet" href="../assets/css/responsive.css">
</head>
<body>
  <div class="admin-container">
    <aside class="admin-sidebar">
      <div class="flex h-16 items-center border-b border-slate-800 px-5">
        <a href="../index.html" class="flex items-center gap-2">
          <div class="flex h-8 w-8 items-center justify-center rounded-md bg-primary text-primary-foreground">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></svg>
          </div>
          <span class="font-serif text-lg font-bold text-white">Admin Console</span>
        </a>
      </div>
      <nav class="flex-1 p-3 space-y-1">
        <a href="dashboard.html" class="admin-nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
          Dashboard
        </a>
        <a href="subscribers.html" class="admin-nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Subscribers
        </a>
        <a href="plans.html" class="admin-nav-link active">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
          Plans
        </a>
        <a href="reports.html" class="admin-nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
          Reports
        </a>
        <a href="payments.html" class="admin-nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1-2-1Z"/><path d="M16 8h-6"/><path d="M16 12h-9"/><path d="M10 16h-3"/></svg>
          Payments
        </a>
      </nav>
      <div class="border-t border-slate-800 p-3">
         <a href="../index.html" class="admin-nav-link">
           <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
           Logout
         </a>
      </div>
    </aside>

    <div class="main-content">
      <header class="topbar">
        <h1 class="text-sm font-medium">Subscription Plans</h1>
      </header>

      <main class="flex-1 p-4 sm:p-6 lg:p-8">
        <div class="space-y-6">
          <div class="flex items-center justify-between">
             <h2 class="text-2xl font-bold">Manage Plans</h2>
             <button onclick="alert('Add plan modal...')" class="btn btn-primary">Add New Plan</button>
          </div>

          <div class="grid gap-6 lg:grid-cols-3" id="plansGrid">
             <!-- JS populated -->
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../assets/js/mock-data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const grid = document.getElementById('plansGrid');
      grid.innerHTML = PLANS.map(p => `
        <div class="card p-6">
           <h3 class="text-lg font-bold">${p.name}</h3>
           <p class="text-2xl font-bold mt-2">${p.priceLabel}</p>
           <p class="text-xs text-muted-foreground">${p.validity}</p>
           <ul class="mt-4 space-y-2 text-xs text-muted-foreground">
              ${p.features.slice(0, 3).map(f => `<li>• ${f}</li>`).join('')}
           </ul>
           <div class="mt-6 pt-4 border-t flex gap-2">
              <button onclick="alert('Edit plan...')" class="btn btn-outline btn-sm flex-1">Edit</button>
              <button onclick="alert('Deactivate plan...')" class="btn btn-ghost btn-sm text-destructive">Deactivate</button>
           </div>
        </div>
      `).join('');
    });
  </script>
</body>
</html>
