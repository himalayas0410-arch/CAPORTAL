<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Payments — GSTverify</title>
  <link rel="stylesheet" href="../assets/css/style.css"><link rel="stylesheet" href="../assets/css/responsive.css">
</head>
<body>
  <div class="admin-container">
    <aside class="admin-sidebar">
       <div class="flex h-16 items-center border-b border-slate-800 px-5">
        <span class="font-serif text-lg font-bold text-white">Admin Console</span>
      </div>
      <nav class="flex-1 p-2">
        <a href="dashboard.html" class="admin-nav-link">Dashboard</a>
        <a href="subscribers.html" class="admin-nav-link">Subscribers</a>
        <a href="plans.html" class="admin-nav-link">Plans</a>
        <a href="reports.html" class="admin-nav-link">Reports</a>
        <a href="payments.html" class="admin-nav-link active">Payments</a>
      </nav>
    </aside>

    <div class="main-content">
      <header class="topbar">
        <h1 class="text-sm font-medium">Revenue & Payments</h1>
      </header>

      <main class="flex-1 p-4 sm:p-6 lg:p-8">
        <div class="space-y-6">
          <h2 class="text-2xl font-bold">Payment History</h2>
          
          <div class="card p-0 overflow-hidden">
             <table class="w-full text-sm text-left">
                <thead class="bg-slate-50 text-xs uppercase text-muted-foreground">
                   <tr>
                      <th class="px-5 py-3">Receipt</th>
                      <th class="px-5 py-3">Date</th>
                      <th class="px-5 py-3">Subscriber</th>
                      <th class="px-5 py-3">Plan</th>
                      <th class="px-5 py-3 text-right">Amount</th>
                      <th class="px-5 py-3">Status</th>
                   </tr>
                </thead>
                <tbody id="paymentsBody">
                   <!-- Backend populated -->
                </tbody>
             </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // 1. Protect Admin Page
      const user = await window.authBackend.protectAdminPage();
      if (!user) return;

      const tbody = document.getElementById('paymentsBody');

      async function loadPayments() {
        const payments = await window.adminBackend.getPayments(1, 50);
        
        if (payments.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" class="py-10 text-center text-muted-foreground">No payment records found</td></tr>';
          return;
        }

        tbody.innerHTML = payments.map(p => `
          <tr class="border-t border-slate-100 hover:bg-slate-50">
            <td class="px-5 py-3 font-mono text-xs text-primary">REC-${p.id.substring(0, 8).toUpperCase()}</td>
            <td class="px-5 py-3 text-muted-foreground">${new Date(p.payment_date).toLocaleDateString()}</td>
            <td class="px-5 py-3">
               <div class="font-medium">${p.profiles ? p.profiles.full_name || 'No Name' : 'N/A'}</div>
               <div class="text-xs text-muted-foreground">${p.profiles ? p.profiles.email : ''}</div>
            </td>
            <td class="px-5 py-3">${p.subscription_plans ? p.subscription_plans.name : 'N/A'}</td>
            <td class="px-5 py-3 text-right">₹${p.amount.toLocaleString()}</td>
            <td class="px-5 py-3">
               <span class="inline-flex rounded-full px-2 py-0.5 text-xs font-medium ${
                 p.status === 'Paid' ? 'bg-success/10 text-success' : 'bg-warning/10 text-warning'
               }">${p.status}</span>
            </td>
          </tr>
        `).join('');
      }

      loadPayments();

      // Logout
      document.querySelectorAll('.admin-nav-link[href="../index.html"]').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.preventDefault();
          await window.authBackend.signOut();
        });
      });
    });
  </script>

  

  <!-- Supabase Integration -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase-client.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/subscription-backend.js"></script>
  <script src="../assets/js/upload-backend.js"></script>
  <script src="../assets/js/reports-backend.js"></script>
  <script src="../assets/js/profile-backend.js"></script>
  <script src="../assets/js/contact-support-backend.js"></script>
  <script src="../assets/js/admin-backend.js"></script>
</body>
</html>
