<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — GSTverify</title>
  <meta name="description" content="Reset your GSTverify subscriber password.">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
  <div class="auth-shell">
    <header class="auth-header">
      <div class="mx-auto flex w-full max-w-7xl items-center">
        <a href="index.html" class="flex items-center gap-2">
          <div class="flex h-9 w-9 items-center justify-center rounded-md bg-primary text-primary-foreground">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></svg>
          </div>
          <span class="font-serif text-lg font-bold">GSTverify</span>
        </a>
      </div>
    </header>

    <main class="auth-main">
      <div class="auth-card">
        <div class="mb-6 text-center">
          <h1 class="text-2xl font-bold">Forgot password</h1>
          <p class="mt-1 text-sm text-muted-foreground">Enter your email and we'll send a reset link.</p>
        </div>

        <div class="card p-6">
          <form id="forgotForm">
            <div class="form-group">
              <label>Email or mobile</label>
              <input type="email" id="email" class="form-control" placeholder="you@company.com" required>
              <p id="emailError" class="error-text" style="display:none;">Please enter a valid email.</p>
            </div>
            <button type="submit" class="btn btn-primary w-full btn-lg">Send reset link</button>
          </form>

          <div class="mt-6 text-center">
            <a href="login.html" class="text-sm text-primary hover:underline">Back to login</a>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    document.getElementById('forgotForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const errorEl = document.getElementById('emailError');

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        errorEl.style.display = 'block';
        return;
      }
      errorEl.style.display = 'none';
      alert('Password reset link has been sent to your registered email.');
      this.reset();
    });
  </script>
</body>
</html>
